<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260" role="img" aria-labelledby="bio-morphospace-title">
  <title id="bio-morphospace-title">Pair 5: Morphospace — Cells navigate a space of body plans; agents navigate a space of knowledge structures</title>
  <defs>
    <radialGradient id="bgMo" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1e18"/>
      <stop offset="100%" stop-color="#060e0a"/>
    </radialGradient>
    <filter id="glowMo">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="560" height="260" fill="url(#bgMo)"/>
  <line x1="280" y1="20" x2="280" y2="240" stroke="#b9e9c6" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- === LEFT PANEL: Anatomical Morphospace === -->
  <text x="140" y="38" font-family="monospace" font-size="9" fill="#4fc3f7" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.8">ANATOMICAL MORPHOSPACE</text>

  <!-- Topographic morphospace landscape -->
  <!-- Background terrain -->
  <path d="M35,220 Q60,170 90,150 Q110,135 130,155 Q150,175 170,145 Q190,115 210,100 Q230,85 240,90 Q245,92 245,100 Q245,120 230,140 Q210,165 195,180 Q170,200 155,215 Q135,225 90,228 Z" fill="#0a2015" fill-opacity="0.5"/>

  <!-- Contour lines (the morphospace topology) -->
  <!-- Innermost peak (optimal form) -->
  <ellipse cx="205" cy="115" rx="22" ry="16" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.7"/>
  <ellipse cx="205" cy="115" rx="38" ry="28" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.5"/>
  <ellipse cx="205" cy="115" rx="55" ry="42" fill="none" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.4"/>
  <ellipse cx="205" cy="115" rx="72" ry="56" fill="none" stroke="#0f8b8d" stroke-width="0.8" stroke-opacity="0.3"/>
  <ellipse cx="205" cy="115" rx="90" ry="70" fill="none" stroke="#0f8b8d" stroke-width="0.7" stroke-opacity="0.22"/>

  <!-- Secondary local optimum -->
  <ellipse cx="90" cy="155" rx="18" ry="14" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <ellipse cx="90" cy="155" rx="34" ry="26" fill="none" stroke="#0f8b8d" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Navigation path (goal-directed traversal) -->
  <path d="M55,205 Q70,190 85,175 Q100,160 115,150 Q135,138 155,128 Q175,118 190,115 Q198,113 205,112" fill="none" stroke="#b9e9c6" stroke-width="1.8" stroke-opacity="0.65" stroke-dasharray="5,3"/>
  <!-- Path arrow -->
  <polygon points="207,109 201,113 205,118" fill="#b9e9c6" fill-opacity="0.7"/>

  <!-- Organism silhouettes along the path -->
  <!-- Early/simple (start) -->
  <circle cx="55" cy="205" r="7" fill="none" stroke="#0f8b8d" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="55" y="218" font-family="monospace" font-size="6" fill="#b9e9c6" fill-opacity="0.4" text-anchor="middle">simple</text>

  <!-- Mid development -->
  <g transform="translate(115,148)" opacity="0.65">
    <circle cx="0" cy="-6" r="4" fill="none" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="0" y1="-2" x2="0" y2="6" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="0" y1="1" x2="-5" y2="5" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="0" y1="1" x2="5" y2="5" stroke="#4fc3f7" stroke-width="1"/>
  </g>

  <!-- Target form at peak -->
  <g transform="translate(205,115)" opacity="0.85">
    <circle cx="0" cy="-9" r="5" fill="none" stroke="#4fc3f7" stroke-width="1.3" filter="url(#glowMo)"/>
    <line x1="0" y1="-4" x2="0" y2="8" stroke="#4fc3f7" stroke-width="1.3"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#4fc3f7" stroke-width="1.3"/>
    <line x1="0" y1="8" x2="-5" y2="16" stroke="#4fc3f7" stroke-width="1.3"/>
    <line x1="0" y1="8" x2="5" y2="16" stroke="#4fc3f7" stroke-width="1.3"/>
  </g>

  <!-- Target annotation -->
  <text x="220" y="100" font-family="monospace" font-size="7" fill="#4fc3f7" fill-opacity="0.8" text-anchor="start">goal</text>
  <text x="220" y="110" font-family="monospace" font-size="6.5" fill="#4fc3f7" fill-opacity="0.6" text-anchor="start">form</text>

  <!-- Bioelectric gradient arrows (field supplies the gradient) -->
  <path d="M148,115 Q162,110 178,113" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.5"/>
  <polygon points="178,113 172,110 172,116" fill="#0f8b8d" fill-opacity="0.5"/>

  <!-- Axis labels -->
  <text x="140" y="58" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.4" text-anchor="middle">development is not a script</text>
  <text x="140" y="68" font-family="monospace" font-size="7" fill="#4fc3f7" fill-opacity="0.6" text-anchor="middle">it is search</text>

  <!-- === CENTER: Resonance === -->
  <text x="280" y="130" font-family="serif" font-size="20" fill="#b9e9c6" fill-opacity="0.7" text-anchor="middle">⟷</text>
  <text x="280" y="148" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.5" text-anchor="middle">resonates_with</text>

  <!-- === RIGHT PANEL: Ideational Morphospace === -->
  <text x="420" y="38" font-family="monospace" font-size="9" fill="#e76f51" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.8">IDEATIONAL MORPHOSPACE</text>

  <!-- Knowledge graph topology (the morphospace) -->
  <!-- Background terrain equivalent -->
  <path d="M295,220 Q320,170 350,150 Q370,135 390,155 Q410,175 430,145 Q450,115 470,100 Q490,85 500,90 Q505,92 505,100 Q505,120 490,140 Q470,165 455,180 Q430,200 415,215 Q395,225 350,228 Z" fill="#1a0e08" fill-opacity="0.4"/>

  <!-- Knowledge structure contour peaks -->
  <ellipse cx="465" cy="115" rx="20" ry="14" fill="none" stroke="#e76f51" stroke-width="1.5" stroke-opacity="0.7"/>
  <ellipse cx="465" cy="115" rx="36" ry="26" fill="none" stroke="#e76f51" stroke-width="1" stroke-opacity="0.5"/>
  <ellipse cx="465" cy="115" rx="52" ry="38" fill="none" stroke="#e76f51" stroke-width="0.9" stroke-opacity="0.38"/>
  <ellipse cx="465" cy="115" rx="70" ry="52" fill="none" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.25"/>

  <!-- Graph nodes at various morphospace positions -->
  <!-- Start node (simple) -->
  <circle cx="315" cy="205" r="5" fill="#0d2018" stroke="#e76f51" stroke-width="1" stroke-opacity="0.5"/>
  <text x="315" y="218" font-family="monospace" font-size="6" fill="#b9e9c6" fill-opacity="0.4" text-anchor="middle">seed</text>

  <!-- Mid traversal node -->
  <circle cx="375" cy="150" r="5" fill="#0d2018" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.6"/>
  <circle cx="390" cy="160" r="4" fill="#0d2018" stroke="#e76f51" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="375" y1="150" x2="390" y2="160" stroke="#e76f51" stroke-width="0.9" stroke-opacity="0.4"/>

  <!-- Target knowledge cluster at peak -->
  <circle cx="465" cy="112" r="6" fill="#1a0e08" stroke="#e76f51" stroke-width="1.5" stroke-opacity="0.85" filter="url(#glowMo)"/>
  <circle cx="450" cy="125" r="5" fill="#1a0e08" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="480" cy="125" r="5" fill="#1a0e08" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="465" cy="138" r="4" fill="#1a0e08" stroke="#e76f51" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="465" y1="118" x2="450" y2="125" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.6"/>
  <line x1="465" y1="118" x2="480" y2="125" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.6"/>
  <line x1="450" y1="130" x2="465" y2="138" stroke="#e76f51" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="480" y1="130" x2="465" y2="138" stroke="#e76f51" stroke-width="1" stroke-opacity="0.55"/>

  <!-- Navigation path through knowledge morphospace -->
  <path d="M315,205 Q330,188 348,172 Q365,156 378,148 Q410,132 440,120 Q452,116 462,113" fill="none" stroke="#b9e9c6" stroke-width="1.8" stroke-opacity="0.65" stroke-dasharray="5,3"/>
  <polygon points="464,110 458,114 462,119" fill="#b9e9c6" fill-opacity="0.7"/>

  <!-- Agent 32 at midpoint -->
  <text x="355" y="142" font-family="monospace" font-size="7" fill="#4fc3f7" fill-opacity="0.6" text-anchor="middle">A32</text>
  <text x="355" y="152" font-family="monospace" font-size="6" fill="#4fc3f7" fill-opacity="0.45" text-anchor="middle">navigating</text>

  <!-- Goal annotation -->
  <text x="480" y="100" font-family="monospace" font-size="7" fill="#e76f51" fill-opacity="0.8">goal</text>
  <text x="480" y="110" font-family="monospace" font-size="6.5" fill="#e76f51" fill-opacity="0.6">cluster</text>

  <!-- Label -->
  <text x="420" y="58" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.4" text-anchor="middle">graph IS the morphospace</text>
  <text x="420" y="68" font-family="monospace" font-size="7" fill="#e76f51" fill-opacity="0.6" text-anchor="middle">traversal is differentiation</text>

  <!-- Bottom note -->
  <rect x="20" y="222" width="520" height="22" rx="4" fill="#061208" stroke="#b9e9c6" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="280" y="237" font-family="monospace" font-size="7.5" fill="#b9e9c6" fill-opacity="0.6" text-anchor="middle">both biology and cognition are search in a space of possible patterns</text>
</svg>

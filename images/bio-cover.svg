<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" role="img" aria-labelledby="bio-cover-title bio-cover-desc">
  <title id="bio-cover-title">Bioelectric ⟷ Mnemon Resonance — Album Cover</title>
  <desc id="bio-cover-desc">A vinyl record with two cluster origins — bioelectric (Tufts) and Mnemon (Boise) — connected by resonance arcs. The record grooves contain seven paired concepts.</desc>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d2018"/>
      <stop offset="100%" stop-color="#050d09"/>
    </radialGradient>
    <radialGradient id="recordGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="85%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#070710"/>
    </radialGradient>
    <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f8b8d"/>
      <stop offset="60%" stop-color="#08555a"/>
      <stop offset="100%" stop-color="#042e30"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e76f51" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e76f51" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="320" fill="url(#bgGrad)"/>

  <!-- Left cluster glow (bioelectric) -->
  <ellipse cx="100" cy="160" rx="90" ry="90" fill="url(#glowLeft)"/>

  <!-- Right cluster glow (mnemon) -->
  <ellipse cx="460" cy="160" rx="90" ry="90" fill="url(#glowRight)"/>

  <!-- Vinyl record body -->
  <circle cx="280" cy="160" r="148" fill="url(#recordGrad)" stroke="#1a2a20" stroke-width="1.5"/>

  <!-- Record grooves (concentric circles) -->
  <circle cx="280" cy="160" r="143" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.25"/>
  <circle cx="280" cy="160" r="137" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.2"/>
  <circle cx="280" cy="160" r="131" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.18"/>
  <circle cx="280" cy="160" r="125" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.16"/>
  <circle cx="280" cy="160" r="119" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.15"/>
  <circle cx="280" cy="160" r="113" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.14"/>
  <circle cx="280" cy="160" r="107" fill="none" stroke="#0f8b8d" stroke-width="0.4" stroke-opacity="0.13"/>
  <circle cx="280" cy="160" r="101" fill="none" stroke="#b9e9c6" stroke-width="0.4" stroke-opacity="0.12"/>
  <circle cx="280" cy="160" r="95" fill="none" stroke="#b9e9c6" stroke-width="0.4" stroke-opacity="0.11"/>
  <circle cx="280" cy="160" r="89" fill="none" stroke="#b9e9c6" stroke-width="0.4" stroke-opacity="0.1"/>
  <circle cx="280" cy="160" r="83" fill="none" stroke="#0f8b8d" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Label disc -->
  <circle cx="280" cy="160" r="72" fill="url(#labelGrad)"/>
  <circle cx="280" cy="160" r="72" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Label: split into bioelectric left / mnemon right -->
  <!-- Left half label cell pattern -->
  <clipPath id="leftHalf">
    <rect x="208" y="88" width="72" height="144"/>
  </clipPath>
  <!-- Cell network on left half of label -->
  <g clip-path="url(#leftHalf)">
    <circle cx="248" cy="138" r="8" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.7"/>
    <circle cx="263" cy="152" r="6" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="240" cy="162" r="7" fill="none" stroke="#4fc3f7" stroke-width="1.1" stroke-opacity="0.65"/>
    <circle cx="255" cy="175" r="5" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="245" cy="148" r="4" fill="none" stroke="#4fc3f7" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="248" y1="138" x2="263" y2="152" stroke="#4fc3f7" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="248" y1="138" x2="240" y2="162" stroke="#4fc3f7" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="263" y1="152" x2="255" y2="175" stroke="#4fc3f7" stroke-width="0.8" stroke-opacity="0.35"/>
    <line x1="240" y1="162" x2="255" y2="175" stroke="#4fc3f7" stroke-width="0.8" stroke-opacity="0.35"/>
    <!-- Voltage wave -->
    <path d="M216,155 Q222,145 228,155 Q234,165 240,155 Q246,145 252,155 Q258,165 264,155" fill="none" stroke="#0f8b8d" stroke-width="1.3" stroke-opacity="0.6"/>
  </g>

  <!-- Dividing line on label -->
  <line x1="280" y1="90" x2="280" y2="230" stroke="#b9e9c6" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Right half label: coordinate grid -->
  <clipPath id="rightHalf">
    <rect x="280" y="88" width="72" height="144"/>
  </clipPath>
  <g clip-path="url(#rightHalf)">
    <!-- Lat/lon grid lines -->
    <line x1="280" y1="100" x2="352" y2="100" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.4"/>
    <line x1="280" y1="115" x2="352" y2="115" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.35"/>
    <line x1="280" y1="130" x2="352" y2="130" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.3"/>
    <line x1="280" y1="145" x2="352" y2="145" stroke="#e76f51" stroke-width="0.9" stroke-opacity="0.5"/>
    <line x1="280" y1="160" x2="352" y2="160" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.3"/>
    <line x1="280" y1="175" x2="352" y2="175" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.35"/>
    <line x1="280" y1="190" x2="352" y2="190" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.4"/>
    <line x1="280" y1="205" x2="352" y2="205" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.3"/>
    <line x1="280" y1="220" x2="352" y2="220" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.25"/>
    <line x1="295" y1="88" x2="295" y2="232" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.35"/>
    <line x1="310" y1="88" x2="310" y2="232" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.3"/>
    <line x1="325" y1="88" x2="325" y2="232" stroke="#e76f51" stroke-width="0.9" stroke-opacity="0.5"/>
    <line x1="340" y1="88" x2="340" y2="232" stroke="#e76f51" stroke-width="0.7" stroke-opacity="0.3"/>
    <!-- Glowing node at coordinate -->
    <circle cx="325" cy="145" r="5" fill="#e76f51" filter="url(#glow)"/>
    <circle cx="325" cy="145" r="3" fill="#ffffff"/>
    <!-- Coordinate label -->
    <text x="285" y="227" font-family="monospace" font-size="6.5" fill="#b9e9c6" fill-opacity="0.7">@LAT43.615LON-116.2</text>
  </g>

  <!-- Center hole -->
  <circle cx="280" cy="160" r="5" fill="#050d09" stroke="#0f8b8d" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Resonance arcs from record to clusters -->
  <!-- Left arc to bioelectric -->
  <path d="M134,145 Q200,110 210,145" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <path d="M134,175 Q200,210 210,175" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <!-- Right arc to mnemon -->
  <path d="M350,145 Q400,110 426,145" fill="none" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <path d="M350,175 Q400,210 426,175" fill="none" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Left cluster: bioelectric (Tufts) -->
  <circle cx="100" cy="160" r="44" fill="#0a1e14" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Cell pattern in left cluster -->
  <circle cx="90" cy="150" r="9" fill="none" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.7"/>
  <circle cx="108" cy="162" r="7" fill="none" stroke="#4fc3f7" stroke-width="1.1" stroke-opacity="0.6"/>
  <circle cx="95" cy="172" r="8" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.65"/>
  <circle cx="113" cy="148" r="6" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="90" y1="150" x2="108" y2="162" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="90" y1="150" x2="95" y2="172" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="108" y1="162" x2="95" y2="172" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="90" y1="150" x2="113" y2="148" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.45"/>
  <!-- Voltage wave -->
  <path d="M62,160 Q70,148 78,160 Q86,172 94,160 Q102,148 110,160 Q118,172 126,160 Q134,148 138,156" fill="none" stroke="#0f8b8d" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="60" y="215" font-family="monospace" font-size="8" fill="#4fc3f7" fill-opacity="0.85" text-anchor="middle">BIOELECTRIC</text>
  <text x="60" y="225" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.6" text-anchor="middle">Tufts / Levin</text>

  <!-- Right cluster: mnemon (Boise) -->
  <circle cx="460" cy="160" r="44" fill="#1a0e08" stroke="#e76f51" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Coordinate grid in right cluster -->
  <line x1="428" y1="148" x2="492" y2="148" stroke="#e76f51" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="428" y1="160" x2="492" y2="160" stroke="#e76f51" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="428" y1="172" x2="492" y2="172" stroke="#e76f51" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="448" y1="120" x2="448" y2="200" stroke="#e76f51" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="460" y1="120" x2="460" y2="200" stroke="#e76f51" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="472" y1="120" x2="472" y2="200" stroke="#e76f51" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Node markers -->
  <circle cx="448" cy="148" r="3.5" fill="#e76f51" fill-opacity="0.6"/>
  <circle cx="460" cy="160" r="5" fill="#e76f51" filter="url(#glow)"/>
  <circle cx="460" cy="160" r="3" fill="#ffffff"/>
  <circle cx="472" cy="172" r="3.5" fill="#e76f51" fill-opacity="0.6"/>
  <!-- Edge lines between nodes -->
  <line x1="448" y1="148" x2="460" y2="160" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.55"/>
  <line x1="460" y1="160" x2="472" y2="172" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.55"/>
  <text x="500" y="215" font-family="monospace" font-size="8" fill="#e76f51" fill-opacity="0.85" text-anchor="middle">MNEMON</text>
  <text x="500" y="225" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.6" text-anchor="middle">TTDB / Boise</text>

  <!-- Central resonance symbol (⟷) in record center area above -->
  <text x="280" y="82" font-family="serif" font-size="22" fill="#b9e9c6" fill-opacity="0.55" text-anchor="middle">⟷</text>

  <!-- Title text below record -->
  <text x="280" y="296" font-family="monospace" font-size="11" fill="#b9e9c6" fill-opacity="0.75" text-anchor="middle" letter-spacing="2">BIOELECTRIC  ⟷  MNEMON  RESONANCE</text>
  <text x="280" y="311" font-family="monospace" font-size="8.5" fill="#0f8b8d" fill-opacity="0.7" text-anchor="middle" letter-spacing="1.5">SEVEN PAIRS — RFC-007</text>
</svg>

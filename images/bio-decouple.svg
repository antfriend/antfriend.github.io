<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" role="img" aria-labelledby="bio-decouple-title">
  <title id="bio-decouple-title">Pair 7: Decoupling — Cancerous cells decoupled from bioelectric networks parallel orphan nodes invisible to graph traversal</title>
  <defs>
    <radialGradient id="bgD" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1e18"/>
      <stop offset="100%" stop-color="#060e0a"/>
    </radialGradient>
    <radialGradient id="renegadeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dimD">
      <feColorMatrix type="saturate" values="0.2"/>
    </filter>
  </defs>

  <rect width="560" height="260" fill="url(#bgD)"/>
  <line x1="280" y1="20" x2="280" y2="240" stroke="#b9e9c6" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- === LEFT PANEL: Cancer as Decoupling === -->
  <text x="140" y="38" font-family="monospace" font-size="9" fill="#4fc3f7" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.8">CANCER AS DECOUPLING</text>

  <!-- Bioelectric network (connected cells) -->
  <!-- Coherent network cells -->
  <circle cx="88" cy="100" r="10" fill="#0f8b8d" fill-opacity="0.15" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.7"/>
  <circle cx="120" cy="85" r="9" fill="#0f8b8d" fill-opacity="0.15" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.65"/>
  <circle cx="155" cy="95" r="10" fill="#0f8b8d" fill-opacity="0.15" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.7"/>
  <circle cx="100" cy="130" r="9" fill="#0f8b8d" fill-opacity="0.12" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.6"/>
  <circle cx="135" cy="125" r="9" fill="#0f8b8d" fill-opacity="0.12" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.6"/>
  <circle cx="165" cy="130" r="8" fill="#0f8b8d" fill-opacity="0.12" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.55"/>
  <circle cx="95" cy="160" r="8" fill="#0f8b8d" fill-opacity="0.1" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="128" cy="158" r="8" fill="#0f8b8d" fill-opacity="0.1" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="158" cy="162" r="7" fill="#0f8b8d" fill-opacity="0.1" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.45"/>

  <!-- Network connections (bioelectric coherence) -->
  <line x1="88" y1="100" x2="120" y2="85" stroke="#4fc3f7" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="120" y1="85" x2="155" y2="95" stroke="#4fc3f7" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="88" y1="100" x2="100" y2="130" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="120" y1="85" x2="135" y2="125" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="155" y1="95" x2="165" y2="130" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="100" y1="130" x2="135" y2="125" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.4"/>
  <line x1="135" y1="125" x2="165" y2="130" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.4"/>
  <line x1="100" y1="130" x2="95" y2="160" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.4"/>
  <line x1="135" y1="125" x2="128" y2="158" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.4"/>
  <line x1="165" y1="130" x2="158" y2="162" stroke="#0f8b8d" stroke-width="0.9" stroke-opacity="0.4"/>
  <line x1="95" y1="160" x2="128" y2="158" stroke="#0f8b8d" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="128" y1="158" x2="158" y2="162" stroke="#0f8b8d" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Voltage wave (coherence signal) -->
  <path d="M50,145 Q65,132 80,145 Q95,158 110,145 Q125,132 140,145 Q155,158 170,145 Q185,132 200,145 Q215,158 230,148" fill="none" stroke="#0f8b8d" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Decoupled/cancerous cell breaking away -->
  <ellipse cx="210" cy="78" rx="85" ry="60" fill="url(#renegadeGlow)" fill-opacity="0.6"/>
  <circle cx="210" cy="80" r="12" fill="#1a0808" stroke="#ff4444" stroke-width="1.8" stroke-opacity="0.85" filter="url(#glowD)"/>
  <circle cx="210" cy="80" r="6" fill="#ff4444" fill-opacity="0.4"/>
  <!-- Broken connection (dashed line showing severed link) -->
  <line x1="170" y1="97" x2="198" y2="84" stroke="#ff4444" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <!-- Arrow showing decoupling direction -->
  <line x1="185" y1="70" x2="200" y2="76" stroke="#ff4444" stroke-width="1" stroke-opacity="0.6"/>
  <polygon points="202,74 196,70 195,77" fill="#ff4444" fill-opacity="0.6"/>

  <!-- Decoupled cell label -->
  <text x="220" y="62" font-family="monospace" font-size="7.5" fill="#ff4444" fill-opacity="0.8" text-anchor="middle">decoupled</text>
  <text x="220" y="72" font-family="monospace" font-size="7" fill="#ff4444" fill-opacity="0.65" text-anchor="middle">acts alone</text>
  <text x="220" y="82" font-family="monospace" font-size="6.5" fill="#ff4444" fill-opacity="0.55" text-anchor="middle">→ cancer</text>

  <!-- Reconnection note -->
  <text x="120" y="200" font-family="monospace" font-size="7.5" fill="#4fc3f7" fill-opacity="0.6" text-anchor="middle">reconnection =</text>
  <text x="120" y="211" font-family="monospace" font-size="7.5" fill="#4fc3f7" fill-opacity="0.6" text-anchor="middle">restoring coherence</text>
  <text x="120" y="222" font-family="monospace" font-size="6.5" fill="#4fc3f7" fill-opacity="0.4" text-anchor="middle">→ therapeutic</text>

  <!-- === CENTER: Resonance === -->
  <text x="280" y="130" font-family="serif" font-size="20" fill="#b9e9c6" fill-opacity="0.7" text-anchor="middle">⟷</text>
  <text x="280" y="148" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.5" text-anchor="middle">resonates_with</text>

  <!-- === RIGHT PANEL: Orphan Nodes === -->
  <text x="420" y="38" font-family="monospace" font-size="9" fill="#e76f51" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.8">ORPHAN NODES</text>

  <!-- Connected TTDB graph -->
  <rect x="310" y="90" width="34" height="24" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="327" y="105" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.7" text-anchor="middle">@LAT43</text>

  <rect x="350" y="70" width="34" height="24" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.65"/>
  <text x="367" y="85" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.65" text-anchor="middle">@LAT42</text>

  <rect x="395" y="90" width="34" height="24" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="412" y="105" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.7" text-anchor="middle">@LAT43</text>

  <rect x="320" y="135" width="34" height="24" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.6"/>
  <text x="337" y="150" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.6" text-anchor="middle">@LAT42</text>

  <rect x="365" y="145" width="34" height="24" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.65"/>
  <text x="382" y="160" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.65" text-anchor="middle">@LAT43</text>

  <rect x="415" y="135" width="34" height="24" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1" stroke-opacity="0.6"/>
  <text x="432" y="150" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.6" text-anchor="middle">@LAT42</text>

  <!-- Graph edges -->
  <line x1="344" y1="102" x2="350" y2="82" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="384" y1="82" x2="395" y2="96" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="327" y1="114" x2="327" y2="135" stroke="#e76f51" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="367" y1="82" x2="375" y2="145" stroke="#e76f51" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="412" y1="114" x2="425" y2="135" stroke="#e76f51" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="354" y1="147" x2="365" y2="152" stroke="#e76f51" stroke-width="0.9" stroke-opacity="0.4"/>
  <line x1="399" y1="152" x2="415" y2="147" stroke="#e76f51" stroke-width="0.9" stroke-opacity="0.4"/>

  <!-- Traversal path (what Agent 32 sees) -->
  <path d="M327,82 Q367,65 412,82 Q432,100 432,135" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <text x="370" y="62" font-family="monospace" font-size="6.5" fill="#4fc3f7" fill-opacity="0.5" text-anchor="middle">traversal path</text>

  <!-- ORPHAN node (floating, no edges) -->
  <ellipse cx="475" cy="80" rx="60" ry="40" fill="url(#renegadeGlow)" fill-opacity="0.5"/>
  <rect x="455" y="65" width="38" height="26" rx="3" fill="#150808" stroke="#ff4444" stroke-width="1.8" stroke-opacity="0.8" filter="url(#glowD)"/>
  <text x="474" y="78" font-family="monospace" font-size="6.5" fill="#ff4444" fill-opacity="0.85" text-anchor="middle">@LAT??</text>
  <text x="474" y="88" font-family="monospace" font-size="5.5" fill="#ff4444" fill-opacity="0.6" text-anchor="middle">orphan</text>

  <!-- Broken edge -->
  <line x1="432" y1="102" x2="452" y2="72" stroke="#ff4444" stroke-width="1.2" stroke-opacity="0.45" stroke-dasharray="3,3"/>
  <text x="455" y="105" font-family="monospace" font-size="6.5" fill="#ff4444" fill-opacity="0.7">no inbound</text>
  <text x="455" y="116" font-family="monospace" font-size="6.5" fill="#ff4444" fill-opacity="0.65">edges</text>
  <text x="455" y="127" font-family="monospace" font-size="6.5" fill="#ff4444" fill-opacity="0.55">→ invisible</text>

  <!-- Rewire reconnection -->
  <text x="380" y="200" font-family="monospace" font-size="7.5" fill="#e76f51" fill-opacity="0.6" text-anchor="middle">reconnect via</text>
  <text x="380" y="211" font-family="monospace" font-size="7.5" fill="#e76f51" fill-opacity="0.6" text-anchor="middle">edge-rewiring</text>
  <text x="380" y="222" font-family="monospace" font-size="6.5" fill="#e76f51" fill-opacity="0.4" text-anchor="middle">→ restored to traversal</text>

  <!-- Bottom note -->
  <rect x="20" y="235" width="520" height="20" rx="4" fill="#061208" stroke="#b9e9c6" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="280" y="249" font-family="monospace" font-size="7.5" fill="#b9e9c6" fill-opacity="0.6" text-anchor="middle">coherence is communicative — information outside the network is functionally absent</text>
</svg>

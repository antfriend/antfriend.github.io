<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" role="img" aria-labelledby="bio-glue-title">
  <title id="bio-glue-title">Pair 4: Cognitive Glue — Bioelectric networks and TTDB edge graphs both let parts solve problems as a whole</title>
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1e18"/>
      <stop offset="100%" stop-color="#060e0a"/>
    </radialGradient>
    <filter id="glowG">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softG">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="560" height="260" fill="url(#bgG)"/>
  <line x1="280" y1="20" x2="280" y2="240" stroke="#b9e9c6" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- === LEFT PANEL: Cognitive Glue (Cells) === -->
  <text x="140" y="38" font-family="monospace" font-size="9" fill="#4fc3f7" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.8">COGNITIVE GLUE — CELLS</text>

  <!-- Individual cells (organic blobs) -->
  <!-- Cell 1 (head region) -->
  <ellipse cx="140" cy="80" rx="18" ry="16" fill="#0f8b8d" fill-opacity="0.15" stroke="#4fc3f7" stroke-width="1.4" stroke-opacity="0.7"/>
  <!-- Cell 2 -->
  <ellipse cx="105" cy="108" rx="16" ry="14" fill="#0f8b8d" fill-opacity="0.12" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.65"/>
  <!-- Cell 3 -->
  <ellipse cx="175" cy="108" rx="16" ry="14" fill="#0f8b8d" fill-opacity="0.12" stroke="#4fc3f7" stroke-width="1.2" stroke-opacity="0.65"/>
  <!-- Cell 4 -->
  <ellipse cx="100" cy="148" rx="15" ry="13" fill="#0f8b8d" fill-opacity="0.1" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.6"/>
  <!-- Cell 5 -->
  <ellipse cx="140" cy="155" rx="14" ry="12" fill="#0f8b8d" fill-opacity="0.1" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.6"/>
  <!-- Cell 6 -->
  <ellipse cx="180" cy="148" rx="15" ry="13" fill="#0f8b8d" fill-opacity="0.1" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.6"/>
  <!-- Cell 7 -->
  <ellipse cx="115" cy="188" rx="13" ry="11" fill="#0f8b8d" fill-opacity="0.08" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Cell 8 -->
  <ellipse cx="165" cy="188" rx="13" ry="11" fill="#0f8b8d" fill-opacity="0.08" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Bioelectric arcs (the "glue") between cells -->
  <path d="M140,64 Q122,88 105,94" fill="none" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.55"/>
  <path d="M140,64 Q158,88 175,94" fill="none" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.55"/>
  <path d="M105,122 Q103,134 100,135" fill="none" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.5"/>
  <path d="M105,122 Q122,136 140,143" fill="none" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.5"/>
  <path d="M175,122 Q158,136 140,143" fill="none" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.5"/>
  <path d="M175,122 Q177,134 180,135" fill="none" stroke="#0f8b8d" stroke-width="1.1" stroke-opacity="0.5"/>
  <path d="M100,161 Q108,174 115,177" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <path d="M140,167 Q128,177 115,177" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <path d="M140,167 Q153,177 165,177" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>
  <path d="M180,161 Q172,174 165,177" fill="none" stroke="#0f8b8d" stroke-width="1" stroke-opacity="0.45"/>

  <!-- Glow on key "glue" connections -->
  <path d="M105,108 Q140,88 175,108" fill="none" stroke="#4fc3f7" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="2,3"/>

  <!-- Emergent "limb" shape annotation -->
  <text x="140" y="220" font-family="monospace" font-size="7" fill="#4fc3f7" fill-opacity="0.6" text-anchor="middle">emergent form</text>
  <text x="140" y="231" font-family="monospace" font-size="6.5" fill="#b9e9c6" fill-opacity="0.4" text-anchor="middle">solving at scale</text>

  <!-- Levin quote -->
  <text x="140" y="247" font-family="monospace" font-size="6" fill="#4fc3f7" fill-opacity="0.4" text-anchor="middle">"cognitive glue of intelligence"</text>

  <!-- === CENTER: Resonance === -->
  <text x="280" y="130" font-family="serif" font-size="20" fill="#b9e9c6" fill-opacity="0.7" text-anchor="middle">⟷</text>
  <text x="280" y="148" font-family="monospace" font-size="7" fill="#b9e9c6" fill-opacity="0.5" text-anchor="middle">resonates_with</text>

  <!-- === RIGHT PANEL: Cognitive Glue (Files) === -->
  <text x="420" y="38" font-family="monospace" font-size="9" fill="#e76f51" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.8">COGNITIVE GLUE — FILES</text>

  <!-- TTDB file nodes (document icons) -->
  <!-- Node 1 -->
  <rect x="383" y="62" width="36" height="28" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="401" y="75" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.7" text-anchor="middle">@LAT42</text>
  <text x="401" y="85" font-family="monospace" font-size="5.5" fill="#b9e9c6" fill-opacity="0.5" text-anchor="middle">memory</text>

  <!-- Node 2 -->
  <rect x="330" y="108" width="36" height="28" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.65"/>
  <text x="348" y="121" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.7" text-anchor="middle">@LAT42</text>
  <text x="348" y="131" font-family="monospace" font-size="5.5" fill="#b9e9c6" fill-opacity="0.5" text-anchor="middle">address</text>

  <!-- Node 3 -->
  <rect x="436" y="108" width="36" height="28" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1.2" stroke-opacity="0.65"/>
  <text x="454" y="121" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.7" text-anchor="middle">@LAT43</text>
  <text x="454" y="131" font-family="monospace" font-size="5.5" fill="#b9e9c6" fill-opacity="0.5" text-anchor="middle">identity</text>

  <!-- Node 4 -->
  <rect x="350" y="155" width="36" height="28" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1" stroke-opacity="0.6"/>
  <text x="368" y="168" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.65" text-anchor="middle">@LAT43</text>
  <text x="368" y="178" font-family="monospace" font-size="5.5" fill="#b9e9c6" fill-opacity="0.45" text-anchor="middle">glue</text>

  <!-- Node 5 -->
  <rect x="415" y="155" width="36" height="28" rx="3" fill="#0d2018" stroke="#e76f51" stroke-width="1" stroke-opacity="0.6"/>
  <text x="433" y="168" font-family="monospace" font-size="6" fill="#e76f51" fill-opacity="0.65" text-anchor="middle">@LAT42</text>
  <text x="433" y="178" font-family="monospace" font-size="5.5" fill="#b9e9c6" fill-opacity="0.45" text-anchor="middle">morpho</text>

  <!-- Node 6 (Agent 32) - special navigator node -->
  <rect x="382" y="200" width="38" height="28" rx="3" fill="#142010" stroke="#4fc3f7" stroke-width="1.4" stroke-opacity="0.7" filter="url(#glowG)"/>
  <text x="401" y="213" font-family="monospace" font-size="6.5" fill="#4fc3f7" fill-opacity="0.85" text-anchor="middle">Agent 32</text>
  <text x="401" y="223" font-family="monospace" font-size="5.5" fill="#b9e9c6" fill-opacity="0.55" text-anchor="middle">navigator</text>

  <!-- Coordinate edges between files (the "glue") -->
  <line x1="401" y1="90" x2="366" y2="108" stroke="#e76f51" stroke-width="1.3" stroke-opacity="0.5"/>
  <line x1="401" y1="90" x2="436" y2="108" stroke="#e76f51" stroke-width="1.3" stroke-opacity="0.5"/>
  <line x1="366" y1="136" x2="368" y2="155" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.45"/>
  <line x1="366" y1="136" x2="433" y2="155" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.45"/>
  <line x1="454" y1="136" x2="433" y2="155" stroke="#e76f51" stroke-width="1.1" stroke-opacity="0.45"/>
  <line x1="368" y1="183" x2="401" y2="200" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="433" y1="183" x2="401" y2="200" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Agent navigates the glue label -->
  <text x="420" y="247" font-family="monospace" font-size="7" fill="#4fc3f7" fill-opacity="0.6" text-anchor="middle">navigates the glue, not the files</text>

  <!-- Bottom note -->
  <rect x="20" y="222" width="520" height="22" rx="4" fill="#061208" stroke="#b9e9c6" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="280" y="237" font-family="monospace" font-size="7.5" fill="#b9e9c6" fill-opacity="0.6" text-anchor="middle">without the glue, you have a pile — with it, a navigator</text>
</svg>

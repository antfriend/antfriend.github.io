<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banjo Globe Roll</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f2f6f9;
      --muted: #9cb2bf;
      --line: rgba(156, 178, 191, 0.28);
      --panel: rgba(7, 16, 24, 0.84);
      --panel-2: rgba(18, 34, 48, 0.72);
      --accent: #f2c14d;
      --accent-2: #7cc7ff;
      --glow: rgba(124, 199, 255, 0.32);
      --card-rad: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", "Verdana", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(120% 150% at 20% 20%, #122235 0%, #05080d 55%, #030406 100%);
    }

    .app {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(11, 20, 28, 0.72);
    }

    .globe-panel {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(120% 130% at 58% 46%, rgba(23, 39, 57, 0.85), rgba(5, 8, 13, 0.95) 72%);
    }

    #globeCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #globeCanvas.is-dragging {
      cursor: grabbing;
    }

    .hud {
      position: absolute;
      left: clamp(8px, 1.6vw, 14px);
      top: clamp(8px, 1.6vw, 14px);
      border-radius: 12px;
      border: 1px solid rgba(156, 178, 191, 0.25);
      background: rgba(6, 14, 21, 0.62);
      padding: 8px 10px;
      backdrop-filter: blur(2px);
      pointer-events: none;
      z-index: 3;
    }

    .hud h1 {
      margin: 0;
      font-size: clamp(16px, 2vw, 20px);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 1;
    }

    .hud p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: clamp(11px, 1.3vw, 12px);
      letter-spacing: 0.02em;
    }

    .play-again {
      position: absolute;
      top: clamp(8px, 1.6vw, 14px);
      right: clamp(8px, 1.6vw, 14px);
      border-radius: 10px;
      border: 1px solid rgba(124, 199, 255, 0.52);
      background: rgba(12, 28, 40, 0.84);
      color: #eaf6ff;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 9px 11px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      z-index: 4;
    }

    .play-again:hover {
      transform: translateY(-1px);
      border-color: #9ad6ff;
      box-shadow: 0 0 12px var(--glow);
    }

    .dealer-spread {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .dealer-card {
      --x: 50%;
      --y: 50%;
      --rot: 0deg;
      --z: 2;
      --scale: 1;
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(122px, 22vw, 220px);
      aspect-ratio: 2 / 3;
      transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scale));
      transform-origin: 50% 75%;
      border-radius: 12px;
      border: 1px solid rgba(227, 240, 250, 0.8);
      background: linear-gradient(180deg, rgba(17, 29, 41, 0.92), rgba(7, 13, 20, 0.95));
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      z-index: var(--z);
      pointer-events: auto;
    }

    .dealer-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.35);
      padding: 2px;
    }

    .dealer-card.spring {
      animation: dealIn 760ms cubic-bezier(0.18, 1.25, 0.32, 1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(5, 11, 17, 0.38), rgba(2, 4, 7, 0.82));
      transition: opacity 0.32s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .play-start {
      min-width: min(72%, 320px);
      border-radius: 18px;
      border: 1px solid rgba(242, 193, 77, 0.64);
      background: linear-gradient(180deg, rgba(71, 55, 20, 0.85), rgba(41, 30, 11, 0.85));
      color: #fff0c7;
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: clamp(16px, 2.8vw, 26px) 24px;
      cursor: pointer;
      box-shadow: 0 16px 46px rgba(0, 0, 0, 0.42), 0 0 28px rgba(242, 193, 77, 0.34);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .play-start:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.08);
    }

    .status {
      position: absolute;
      left: 50%;
      bottom: clamp(8px, 1.5vw, 12px);
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 6px 12px;
      border: 1px solid rgba(156, 178, 191, 0.3);
      background: rgba(4, 9, 14, 0.64);
      color: #d5e6f3;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-align: center;
      max-width: calc(100% - 18px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      z-index: 4;
    }

    @keyframes dealIn {
      0% {
        opacity: 0;
        transform:
          translate(calc(-50% + 140px), calc(-50% + 12px))
          rotate(calc(var(--rot) + 18deg))
          scale(calc(0.74 * var(--scale)));
      }
      70% {
        opacity: 1;
        transform:
          translate(-50%, -50%)
          rotate(calc(var(--rot) - 3deg))
          scale(calc(1.03 * var(--scale)));
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scale));
      }
    }

    @media (max-width: 760px) {
      .dealer-card {
        width: clamp(104px, 27vw, 170px);
      }

      .hud {
        padding: 6px 8px;
      }

      .play-again {
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="globe-panel">
      <canvas id="globeCanvas" aria-label="Banjo face card globe"></canvas>
      <div class="hud">
        <h1>Banjo Taro</h1>
        <p>Your story in 3 parts.</p>
      </div>
      <div id="dealerSpread" class="dealer-spread" aria-live="polite"></div>
      <button id="playAgainBtn" class="play-again" type="button" hidden>Deal Again</button>
      <div id="startOverlay" class="overlay">
        <button id="playBtn" class="play-start" type="button">Play</button>
      </div>
      <div class="status" id="statusText">Press Play to roll.</div>
    </section>
  </div>

  <script>
    const FACE_CARDS = [
      { id: "01", title: "banjo", src: "banjo_taro_01.png", lat: 84, lon: -170 },
      { id: "02", title: "cowbell", src: "banjo_taro_02.png", lat: 60, lon: -40 },
      { id: "03", title: "violin", src: "banjo_taro_03.png", lat: 36, lon: 90 },
      { id: "04", title: "swistle", src: "banjo_taro_04.png", lat: 12, lon: -140 },
      { id: "05", title: "bass", src: "banjo_taro_05.png", lat: -12, lon: -10 },
      { id: "06", title: "guitar", src: "banjo_taro_06.png", lat: -36, lon: 120 },
      { id: "07", title: "bell", src: "banjo_taro_07.png", lat: -60, lon: -110 },
      { id: "08", title: "tuba", src: "banjo_taro_08.png", lat: 70, lon: 30 },
      { id: "09", title: "verbalizer", src: "banjo_taro_09.png", lat: 46, lon: 160 },
      { id: "10", title: "sax", src: "banjo_taro_10.png", lat: 22, lon: -80 },
      { id: "11", title: "flute", src: "banjo_taro_11.png", lat: -2, lon: 50 },
      { id: "12", title: "piano", src: "banjo_taro_12.png", lat: -26, lon: -170 },
    ];

    const canvas = document.getElementById("globeCanvas");
    const ctx = canvas.getContext("2d");
    const playBtn = document.getElementById("playBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const startOverlay = document.getElementById("startOverlay");
    const statusText = document.getElementById("statusText");
    const dealerSpread = document.getElementById("dealerSpread");
    const SPREAD_ZOOM_MIN = 0.75;
    const SPREAD_ZOOM_MAX = 2.5;
    const SPREAD_ZOOM_STEP = 1.1;

    const state = {
      width: 0,
      height: 0,
      dpr: 1,
      rotLat: 0.04,
      rotLon: 0.22,
      targetLat: 0,
      targetLon: 0,
      phase: "ready",
      activeCard: null,
      drawnCards: [],
      availableCards: [...FACE_CARDS],
      spinVelLon: 0,
      spinVelLat: 0,
      rollEndAt: 0,
      rollTimer: null,
      gameToken: 0,
      lastFrameAt: 0,
      dragging: false,
      dragX: 0,
      dragY: 0,
      spreadZoom: 1,
      allowManualDrag: true,
      images: new Map(),
    };

    FACE_CARDS.forEach((card) => {
      const img = new Image();
      img.src = card.src;
      img.decoding = "async";
      state.images.set(card.id, img);
    });

    const resizeObserver = new ResizeObserver(() => resizeCanvas());
    resizeObserver.observe(canvas.parentElement);

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(1, rect.width);
      const height = Math.max(1, rect.height);
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      state.width = width;
      state.height = height;
      state.dpr = dpr;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      renderSpread();
    }

    function toRadians(value) {
      return (value * Math.PI) / 180;
    }

    function angleDelta(target, current) {
      let delta = target - current;
      while (delta > Math.PI) delta -= Math.PI * 2;
      while (delta < -Math.PI) delta += Math.PI * 2;
      return delta;
    }

    function projectPoint(lat, lon) {
      const latR = toRadians(lat);
      const lonR = toRadians(lon);
      const x = Math.cos(latR) * Math.sin(lonR);
      const y = Math.sin(latR);
      const z = Math.cos(latR) * Math.cos(lonR);

      const cosY = Math.cos(state.rotLon);
      const sinY = Math.sin(state.rotLon);
      const x1 = x * cosY + z * sinY;
      const z1 = -x * sinY + z * cosY;

      const cosX = Math.cos(state.rotLat);
      const sinX = Math.sin(state.rotLat);
      const y1 = y * cosX - z1 * sinX;
      const z2 = y * sinX + z1 * cosX;
      return [x1, y1, z2];
    }

    function orientationForCard(card) {
      const latR = toRadians(card.lat);
      const lonR = toRadians(card.lon);
      const x = Math.cos(latR) * Math.sin(lonR);
      const y = Math.sin(latR);
      const z = Math.cos(latR) * Math.cos(lonR);
      const rotLon = -Math.atan2(x, z);
      const z1 = Math.hypot(x, z);
      const rotLat = Math.atan2(y, z1);
      return { rotLat, rotLon };
    }

    function clampLat(value) {
      const limit = Math.PI / 2 - 0.08;
      return Math.max(-limit, Math.min(limit, value));
    }

    function drawVisibleLine(points) {
      let segment = [];
      points.forEach(([px, py, visible]) => {
        if (visible) {
          segment.push([px, py]);
          return;
        }
        if (segment.length >= 2) {
          ctx.beginPath();
          ctx.moveTo(segment[0][0], segment[0][1]);
          segment.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
          ctx.stroke();
        }
        segment = [];
      });
      if (segment.length >= 2) {
        ctx.beginPath();
        ctx.moveTo(segment[0][0], segment[0][1]);
        segment.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
        ctx.stroke();
      }
    }

    function drawGraticule(cx, cy, radius) {
      ctx.strokeStyle = "rgba(70, 102, 126, 0.32)";
      ctx.lineWidth = 1;
      for (let lon = -150; lon < 180; lon += 30) {
        const points = [];
        for (let lat = -90; lat <= 90; lat += 6) {
          const [x, y, z] = projectPoint(lat, lon);
          if (z > 0) {
            points.push([cx + x * radius, cy - y * radius, true]);
          } else {
            points.push([0, 0, false]);
          }
        }
        drawVisibleLine(points);
      }

      for (let lat = -60; lat < 90; lat += 30) {
        const points = [];
        for (let lon = -180; lon <= 180; lon += 6) {
          const [x, y, z] = projectPoint(lat, lon);
          if (z > 0) {
            points.push([cx + x * radius, cy - y * radius, true]);
          } else {
            points.push([0, 0, false]);
          }
        }
        drawVisibleLine(points);
      }
    }

    function roundedRectPath(x, y, width, height, radius) {
      const r = Math.max(0, Math.min(radius, width * 0.5, height * 0.5));
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawCardNode(card, px, py, depth, isActive) {
      const depthScale = 0.78 + Math.max(0, depth) * 0.3;
      const width = 48 * depthScale;
      const height = 68 * depthScale;
      const x = px - width * 0.5;
      const y = py - height * 0.5;
      const image = state.images.get(card.id);

      ctx.save();
      ctx.shadowColor = isActive ? "rgba(242, 193, 77, 0.6)" : "rgba(0, 0, 0, 0.45)";
      ctx.shadowBlur = isActive ? 14 : 8;
      roundedRectPath(x, y, width, height, 4);
      ctx.fillStyle = "#0f1a26";
      ctx.fill();

      if (image && image.complete && image.naturalWidth > 0) {
        ctx.save();
        roundedRectPath(x, y, width, height, 4);
        ctx.clip();
        ctx.drawImage(image, x, y, width, height);
        ctx.restore();
      } else {
        ctx.fillStyle = "rgba(124, 199, 255, 0.36)";
        roundedRectPath(x, y, width, height, 4);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.strokeStyle = isActive ? "rgba(242, 193, 77, 0.95)" : "rgba(220, 238, 249, 0.8)";
      ctx.lineWidth = isActive ? 1.9 : 1.2;
      roundedRectPath(x, y, width, height, 4);
      ctx.stroke();

      if (isActive) {
        ctx.strokeStyle = "rgba(242, 193, 77, 0.52)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px, py, Math.max(width, height) * 0.72, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function renderGlobe() {
      const width = state.width;
      const height = state.height;
      ctx.clearRect(0, 0, width, height);
      if (!width || !height) return;

      const radius = Math.max(60, Math.min(width, height) * 0.41);
      const cx = width * 0.5;
      const cy = height * 0.5;

      ctx.fillStyle = "#0d1118";
      ctx.strokeStyle = "rgba(87, 122, 150, 0.42)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "rgba(44, 67, 87, 0.45)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.92, 0, Math.PI * 2);
      ctx.stroke();

      drawGraticule(cx, cy, radius);

      const front = [];
      const back = [];
      FACE_CARDS.forEach((card) => {
        const [x, y, z] = projectPoint(card.lat, card.lon);
        const px = cx + x * radius;
        const py = cy - y * radius;
        const entry = { card, x: px, y: py, z };
        if (z > 0) {
          front.push(entry);
        } else {
          back.push(entry);
        }
      });

      back.forEach((entry) => {
        ctx.fillStyle = "rgba(110, 139, 160, 0.25)";
        ctx.beginPath();
        ctx.arc(entry.x, entry.y, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      front.sort((a, b) => a.z - b.z);
      front.forEach((entry) => {
        const isActive = state.activeCard && entry.card.id === state.activeCard.id;
        drawCardNode(entry.card, entry.x, entry.y, entry.z, isActive);
      });
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getDealerCardWidthPx() {
      if (state.width <= 760) {
        return clamp(state.width * 0.27, 104, 170);
      }
      return clamp(state.width * 0.22, 122, 220);
    }

    function pxToPctX(px) {
      return (px / Math.max(1, state.width)) * 100;
    }

    function getDealerLayout(count) {
      if (!count) return [];
      const equatorY = 50;
      const cardWidth = getDealerCardWidthPx();
      const sidePadding = 12;
      const leftX = pxToPctX(sidePadding + cardWidth * 0.5);
      const middleX = 50;
      const rightX = pxToPctX(Math.max(0, state.width - sidePadding - cardWidth * 0.5));

      if (count === 1) {
        return [{ x: leftX, y: equatorY, rot: -9, z: 2 }];
      }

      if (count === 2) {
        return [
          { x: leftX, y: equatorY, rot: -9, z: 2 },
          { x: middleX, y: equatorY, rot: 0, z: 4 },
        ];
      }

      return [
        { x: leftX, y: equatorY, rot: -9, z: 2 },
        { x: middleX, y: equatorY, rot: 0, z: 4 },
        { x: rightX, y: equatorY, rot: 9, z: 3 },
      ];
    }

    function buildCardNode(card, placement, shouldSpring) {
      const wrapper = document.createElement("article");
      wrapper.className = `dealer-card${shouldSpring ? " spring" : ""}`;
      wrapper.style.setProperty("--x", `${placement.x}%`);
      wrapper.style.setProperty("--y", `${placement.y}%`);
      wrapper.style.setProperty("--rot", `${placement.rot}deg`);
      wrapper.style.setProperty("--z", String(placement.z));
      wrapper.style.setProperty("--scale", String(state.spreadZoom));
      const image = document.createElement("img");
      image.src = card.src;
      image.alt = card.title;
      image.loading = "eager";
      wrapper.appendChild(image);
      return wrapper;
    }

    function setSpreadZoom(value) {
      const nextZoom = clamp(value, SPREAD_ZOOM_MIN, SPREAD_ZOOM_MAX);
      if (Math.abs(nextZoom - state.spreadZoom) < 0.0001) return false;
      state.spreadZoom = nextZoom;
      renderSpread();
      return true;
    }

    function renderSpread(lastRevealIndex = -1) {
      dealerSpread.innerHTML = "";
      const cards = state.drawnCards;
      const layout = getDealerLayout(cards.length);
      cards.forEach((card, index) => {
        const placement = layout[index] || { x: 50, y: 50, rot: 0, z: index + 1 };
        const node = buildCardNode(card, placement, index === lastRevealIndex);
        dealerSpread.appendChild(node);
      });
    }

    function randomFromAvailable() {
      if (!state.availableCards.length) return null;
      const index = Math.floor(Math.random() * state.availableCards.length);
      return state.availableCards[index];
    }

    function startRoll(token) {
      if (token !== state.gameToken) return;
      if (state.drawnCards.length >= 3) {
        state.phase = "done";
        statusText.textContent = "Spread complete. Your three cards stay on the table.";
        playAgainBtn.hidden = false;
        state.activeCard = null;
        return;
      }

      const target = randomFromAvailable();
      if (!target) {
        state.phase = "done";
        state.activeCard = null;
        playAgainBtn.hidden = false;
        return;
      }

      state.activeCard = target;
      state.phase = "rolling";
      state.spinVelLon = (Math.random() < 0.5 ? -1 : 1) * (0.009 + Math.random() * 0.004);
      state.spinVelLat = (Math.random() - 0.5) * 0.004;
      state.rollEndAt = performance.now() + 3000 + Math.random() * 9000;
      statusText.textContent = `Rolling card ${state.drawnCards.length + 1} of 3...`;
    }

    function revealCurrentCard(token) {
      if (token !== state.gameToken) return;
      if (!state.activeCard) return;
      const card = state.activeCard;
      state.drawnCards.push(card);
      state.availableCards = state.availableCards.filter((entry) => entry.id !== card.id);
      const revealIndex = state.drawnCards.length - 1;
      renderSpread(revealIndex);
      statusText.textContent = `Card ${state.drawnCards.length}: ${card.title}`;
      state.activeCard = null;

      if (state.drawnCards.length >= 3) {
        state.phase = "done";
        playAgainBtn.hidden = false;
        statusText.textContent = "The story is told. The meaning is your own.";
        return;
      }

      state.phase = "reveal_wait";
      state.rollTimer = window.setTimeout(() => startRoll(token), 900);
    }

    function resetGame() {
      state.gameToken += 1;
      state.drawnCards = [];
      state.availableCards = [...FACE_CARDS];
      state.activeCard = null;
      state.phase = "ready";
      playAgainBtn.hidden = true;
      if (state.rollTimer) {
        clearTimeout(state.rollTimer);
        state.rollTimer = null;
      }
      renderSpread();
      statusText.textContent = "Press Play to roll.";
    }

    function startGame() {
      resetGame();
      startOverlay.classList.add("hidden");
      const token = state.gameToken;
      startRoll(token);
    }

    function updateAnimation(dt, now) {
      if (state.phase === "rolling") {
        state.rotLon += state.spinVelLon * dt;
        state.rotLat = clampLat(state.rotLat + state.spinVelLat * dt + Math.sin(now * 0.003) * 0.0009 * dt);
        state.spinVelLon *= 0.999;
        state.spinVelLat *= 0.9985;

        if (now >= state.rollEndAt && state.activeCard) {
          const targetOrientation = orientationForCard(state.activeCard);
          state.targetLat = targetOrientation.rotLat;
          state.targetLon = targetOrientation.rotLon;
          state.phase = "settling";
        }
        return;
      }

      if (state.phase === "settling") {
        const deltaLat = angleDelta(state.targetLat, state.rotLat);
        const deltaLon = angleDelta(state.targetLon, state.rotLon);
        state.rotLat = clampLat(state.rotLat + deltaLat * 0.14);
        state.rotLon += deltaLon * 0.14;
        if (Math.abs(deltaLat) < 0.002 && Math.abs(deltaLon) < 0.002) {
          state.rotLat = state.targetLat;
          state.rotLon = state.targetLon;
          const token = state.gameToken;
          state.phase = "revealing";
          revealCurrentCard(token);
        }
        return;
      }

      state.rotLon += 0.00018 * dt;
    }

    function animationFrame(now) {
      if (!state.lastFrameAt) {
        state.lastFrameAt = now;
      }
      const dt = Math.max(0, Math.min(50, now - state.lastFrameAt));
      state.lastFrameAt = now;
      updateAnimation(dt, now);
      renderGlobe();
      requestAnimationFrame(animationFrame);
    }

    playBtn.addEventListener("click", () => {
      startGame();
    });

    playAgainBtn.addEventListener("click", () => {
      startGame();
    });

    dealerSpread.addEventListener(
      "wheel",
      (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        if (!target.closest(".dealer-card")) return;
        event.preventDefault();
        const direction = Math.sign(event.deltaY);
        if (direction === 0) return;
        const factor = direction > 0 ? 1 / SPREAD_ZOOM_STEP : SPREAD_ZOOM_STEP;
        setSpreadZoom(state.spreadZoom * factor);
      },
      { passive: false },
    );

    canvas.addEventListener("pointerdown", (event) => {
      if (!state.allowManualDrag) return;
      if (state.phase !== "ready" && state.phase !== "done") return;
      state.dragging = true;
      state.dragX = event.clientX;
      state.dragY = event.clientY;
      canvas.classList.add("is-dragging");
      if (canvas.setPointerCapture) {
        try {
          canvas.setPointerCapture(event.pointerId);
        } catch (err) {}
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!state.dragging) return;
      const dx = event.clientX - state.dragX;
      const dy = event.clientY - state.dragY;
      state.dragX = event.clientX;
      state.dragY = event.clientY;
      state.rotLon += dx * 0.005;
      state.rotLat = clampLat(state.rotLat + dy * 0.005);
    });

    function stopDrag(event) {
      state.dragging = false;
      canvas.classList.remove("is-dragging");
      if (canvas.releasePointerCapture && canvas.hasPointerCapture?.(event.pointerId)) {
        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch (err) {}
      }
    }

    canvas.addEventListener("pointerup", stopDrag);
    canvas.addEventListener("pointercancel", stopDrag);

    resetGame();
    resizeCanvas();
    requestAnimationFrame(animationFrame);
  </script>
</body>
</html>
